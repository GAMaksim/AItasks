<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 3 — Yuz Aniqlash (BlazeFace)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px
        }

        h1 {
            color: #fdcb6e;
            margin-bottom: 5px
        }

        .sub {
            color: #a8a8b3;
            margin-bottom: 20px
        }

        .container {
            background: #16213e;
            border-radius: 15px;
            padding: 25px;
            max-width: 650px;
            width: 100%;
            text-align: center
        }

        canvas {
            border-radius: 10px
        }

        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px
        }

        .btn:hover {
            background: #c0392b
        }

        #status {
            color: #fdcb6e;
            margin: 12px 0
        }

        #faceCount {
            font-size: 20px;
            color: #00b894;
            margin: 10px 0
        }
    </style>
</head>

<body>
    <h1>Yuz Aniqlash</h1>
    <p class="sub">TensorFlow.js + BlazeFace</p>
    <div class="container">
        <canvas id="canvas"></canvas>
        <br>
        <button class="btn" onclick="start()">Boshlash</button>
        <p id="status">Model yuklanmoqda...</p>
        <p id="faceCount"></p>
    </div>
    <video id="video" autoplay playsinline style="display:none"></video>
    <script>
        let model;
        async function init() {
            model = await blazeface.load();
            document.getElementById('status').textContent = 'Model tayyor!';
        }
        async function start() {
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            await video.play();
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            detectLoop();
        }
        async function detectLoop() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            const predictions = await model.estimateFaces(video, false);
            document.getElementById('faceCount').textContent = `${predictions.length} ta yuz topildi`;
            predictions.forEach(pred => {
                const start = pred.topLeft;
                const end = pred.bottomRight;
                const size = [end[0] - start[0], end[1] - start[1]];
                // Ramka
                ctx.strokeStyle = '#fdcb6e'; ctx.lineWidth = 3;
                ctx.strokeRect(start[0], start[1], size[0], size[1]);
                // Ehtimollik
                ctx.fillStyle = '#fdcb6e';
                ctx.fillRect(start[0], start[1] - 22, 80, 22);
                ctx.fillStyle = '#1a1a2e'; ctx.font = '14px Segoe UI';
                ctx.fillText(`Yuz ${(pred.probability[0] * 100).toFixed(0)}%`, start[0] + 5, start[1] - 6);
                // Nuqtalar (ko'z, burun, og'iz, quloq)
                const landmarks = pred.landmarks;
                const names = ['O\'ng ko\'z', 'Chap ko\'z', 'Burun', 'Og\'iz', 'O\'ng quloq', 'Chap quloq'];
                landmarks.forEach((point, i) => {
                    ctx.fillStyle = '#e94560'; ctx.beginPath(); ctx.arc(point[0], point[1], 4, 0, 2 * Math.PI); ctx.fill();
                });
            });
            requestAnimationFrame(detectLoop);
        }
        init();
    </script>
</body>

</html>
