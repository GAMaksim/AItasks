<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 1 — Emoji Qidiruv</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px
        }

        h1 {
            color: #fdcb6e;
            margin-bottom: 5px
        }

        .sub {
            color: #a8a8b3;
            margin-bottom: 20px
        }

        .container {
            background: #16213e;
            border-radius: 15px;
            padding: 25px;
            max-width: 600px;
            width: 100%;
            text-align: center
        }

        video {
            width: 100%;
            border-radius: 10px;
            margin: 10px 0
        }

        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px
        }

        .btn:hover {
            background: #c0392b
        }

        .emoji-target {
            font-size: 80px;
            margin: 15px 0
        }

        .result {
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 6px 0;
            display: flex;
            justify-content: space-between
        }

        #status {
            color: #fdcb6e;
            margin: 12px 0
        }

        #score {
            font-size: 24px;
            color: #00b894
        }
    </style>
</head>

<body>
    <h1>Emoji Qidiruv O'yini</h1>
    <p class="sub">Kameraga ko'rsating — AI aniqlaydi!</p>
    <div class="container">
        <div class="emoji-target" id="target"></div>
        <p>Shu narsani kameraga ko'rsating!</p>
        <video id="video" autoplay playsinline></video>
        <button class="btn" onclick="startGame()">O'yinni boshlash</button>
        <p id="status">Model yuklanmoqda...</p>
        <p id="score"></p>
        <div id="results"></div>
    </div>
    <canvas id="canvas" style="display:none"></canvas>
    <script>
        let model;
        const challenges = [
            { emoji: "📱", words: ["cellular telephone", "phone", "smartphone"] },
            { emoji: "✋", words: ["hand", "finger"] },
            { emoji: "☕", words: ["coffee mug", "cup", "espresso"] },
            { emoji: "⌨️", words: ["keyboard", "computer keyboard"] },
            { emoji: "🖱️", words: ["mouse", "computer mouse"] },
        ];
        let current = 0, score = 0, playing = false;
        async function init() {
            model = await mobilenet.load();
            document.getElementById('status').textContent = 'Model tayyor!';
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;
        }
        function startGame() {
            score = 0; current = 0; playing = true;
            showChallenge();
            detectLoop();
        }
        function showChallenge() {
            if (current >= challenges.length) {
                document.getElementById('target').textContent = '🎉';
                document.getElementById('status').textContent = `O'yin tugadi!`;
                document.getElementById('score').textContent = `Ball: ${score}/${challenges.length}`;
                playing = false; return;
            }
            document.getElementById('target').textContent = challenges[current].emoji;
            document.getElementById('score').textContent = `Ball: ${score}`;
        }
        async function detectLoop() {
            if (!playing) return;
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const preds = await model.classify(canvas);
            let html = '';
            preds.forEach(p => {
                html += `<div class="result"><span>${p.className}</span><span style="color:#00b894">${(p.probability * 100).toFixed(1)}%</span></div>`;
            });
            document.getElementById('results').innerHTML = html;
            const found = preds.some(p => challenges[current].words.some(w => p.className.toLowerCase().includes(w)));
            if (found) { score++; current++; showChallenge(); }
            if (playing) setTimeout(detectLoop, 1500);
        }
        init();
    </script>
</body>

</html>
