<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 4 — Matn Toksiklik Aniqlash</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/toxicity"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px
        }

        h1 {
            color: #fdcb6e;
            margin-bottom: 5px
        }

        .sub {
            color: #a8a8b3;
            margin-bottom: 20px
        }

        .container {
            background: #16213e;
            border-radius: 15px;
            padding: 25px;
            max-width: 600px;
            width: 100%;
            text-align: center
        }

        textarea {
            width: 100%;
            height: 80px;
            background: #0f3460;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            resize: vertical;
            margin: 10px 0
        }

        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px
        }

        .btn:hover {
            background: #c0392b
        }

        .result {
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .safe {
            color: #00b894
        }

        .toxic {
            color: #e94560
        }

        #status {
            color: #fdcb6e;
            margin: 12px 0
        }
    </style>
</head>

<body>
    <h1>Matn Toksiklik Aniqlash</h1>
    <p class="sub">TensorFlow.js + Toxicity Model</p>
    <div class="container">
        <textarea id="textInput"
            placeholder="Ingliz tilida matn yozing...">You are a terrible person and I hate you</textarea>
        <button class="btn" onclick="analyze()">Tahlil qilish</button>
        <p id="status">Model yuklanmoqda...</p>
        <div id="results"></div>
    </div>
    <script>
        let model;
        const labels = {
            'identity_attack': 'Shaxsga hujum',
            'insult': 'Haqorat',
            'obscene': 'Odobsizlik',
            'severe_toxicity': 'Og\'ir toksiklik',
            'sexual_explicit': 'Noqonuniy kontent',
            'threat': 'Tahdid',
            'toxicity': 'Umumiy toksiklik'
        };
        async function init() {
            model = await toxicity.load(0.7);
            document.getElementById('status').textContent = 'Model tayyor!';
        }
        async function analyze() {
            const text = document.getElementById('textInput').value;
            if (!text || !model) return;
            document.getElementById('status').textContent = 'Tahlil...';
            const predictions = await model.classify([text]);
            let html = '';
            predictions.forEach(p => {
                const match = p.results[0].match;
                const prob = p.results[0].probabilities[1];
                const uzName = labels[p.label] || p.label;
                const cls = match ? 'toxic' : 'safe';
                const icon = match ? 'Bor' : 'Yo\'q';
                html += `<div class="result"><span>${uzName}</span><span class="${cls}">${icon} (${(prob * 100).toFixed(1)}%)</span></div>`;
            });
            document.getElementById('results').innerHTML = html;
            document.getElementById('status').textContent = 'Tayyor!';
        }
        init();
    </script>
</body>

</html>
