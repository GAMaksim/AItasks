<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 2 — Poza Aniqlash (MoveNet)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px
        }

        h1 {
            color: #fdcb6e;
            margin-bottom: 5px
        }

        .sub {
            color: #a8a8b3;
            margin-bottom: 20px
        }

        .container {
            background: #16213e;
            border-radius: 15px;
            padding: 25px;
            max-width: 650px;
            width: 100%;
            text-align: center
        }

        .canvas-wrap {
            position: relative;
            display: inline-block
        }

        canvas {
            border-radius: 10px
        }

        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px
        }

        .btn:hover {
            background: #c0392b
        }

        #status {
            color: #fdcb6e;
            margin: 12px 0
        }
    </style>
</head>

<body>
    <h1>Poza Aniqlash</h1>
    <p class="sub">TensorFlow.js + MoveNet</p>
    <div class="container">
        <div class="canvas-wrap">
            <canvas id="canvas"></canvas>
        </div>
        <br>
        <button class="btn" onclick="start()">Boshlash</button>
        <p id="status">Model yuklanmoqda...</p>
    </div>
    <video id="video" autoplay playsinline style="display:none"></video>
    <script>
        let detector;
        const connections = [[0, 1], [0, 2], [1, 3], [2, 4], [5, 6], [5, 7], [7, 9], [6, 8], [8, 10], [5, 11], [6, 12], [11, 12], [11, 13], [13, 15], [12, 14], [14, 16]];

        async function init() {
            detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet);
            document.getElementById('status').textContent = 'Model tayyor!';
        }
        async function start() {
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            await video.play();
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            document.getElementById('status').textContent = 'Poza aniqlanmoqda...';
            detectLoop();
        }
        async function detectLoop() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            const poses = await detector.estimatePoses(video);
            if (poses.length > 0) {
                const kp = poses[0].keypoints;
                // Chiziqlar
                ctx.strokeStyle = '#00b894'; ctx.lineWidth = 3;
                connections.forEach(([a, b]) => {
                    if (kp[a].score > 0.3 && kp[b].score > 0.3) {
                        ctx.beginPath(); ctx.moveTo(kp[a].x, kp[a].y); ctx.lineTo(kp[b].x, kp[b].y); ctx.stroke();
                    }
                });
                // Nuqtalar
                kp.forEach(p => {
                    if (p.score > 0.3) {
                        ctx.fillStyle = '#e94560'; ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI); ctx.fill();
                    }
                });
            }
            requestAnimationFrame(detectLoop);
        }
        init();
    </script>
</body>

</html>
