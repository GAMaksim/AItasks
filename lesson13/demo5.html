<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 5 — Qo'l Aniqlash (HandPose)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px
        }

        h1 {
            color: #fdcb6e;
            margin-bottom: 5px
        }

        .sub {
            color: #a8a8b3;
            margin-bottom: 20px
        }

        .container {
            background: #16213e;
            border-radius: 15px;
            padding: 25px;
            max-width: 650px;
            width: 100%;
            text-align: center
        }

        canvas {
            border-radius: 10px
        }

        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px
        }

        .btn:hover {
            background: #c0392b
        }

        #status {
            color: #fdcb6e;
            margin: 12px 0
        }

        #handCount {
            font-size: 20px;
            color: #00b894;
            margin: 10px 0
        }
    </style>
</head>

<body>
    <h1>Qo'l Aniqlash</h1>
    <p class="sub">TensorFlow.js + MediaPipe Hands</p>
    <div class="container">
        <canvas id="canvas"></canvas>
        <br>
        <button class="btn" onclick="start()">Boshlash</button>
        <p id="status">Model yuklanmoqda...</p>
        <p id="handCount"></p>
    </div>
    <video id="video" autoplay playsinline style="display:none"></video>
    <script>
        let detector;
        const fingerConns = [[0, 1], [1, 2], [2, 3], [3, 4], [0, 5], [5, 6], [6, 7], [7, 8], [0, 9], [9, 10], [10, 11], [11, 12], [0, 13], [13, 14], [14, 15], [15, 16], [0, 17], [17, 18], [18, 19], [19, 20]];
        const fingerColors = ['#e94560', '#fdcb6e', '#00b894', '#6c5ce7', '#fd79a8'];

        async function init() {
            const model = handPoseDetection.SupportedModels.MediaPipeHands;
            detector = await handPoseDetection.createDetector(model, {
                runtime: 'tfjs',
                modelType: 'lite',
                maxHands: 2
            });
            document.getElementById('status').textContent = 'Model tayyor!';
        }
        async function start() {
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            await video.play();
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            detectLoop();
        }
        async function detectLoop() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            const hands = await detector.estimateHands(video);
            document.getElementById('handCount').textContent = `${hands.length} ta qo'l topildi`;
            hands.forEach(hand => {
                const kp = hand.keypoints;
                // Chiziqlar
                fingerConns.forEach(([a, b]) => {
                    const fi = Math.floor(b / 4);
                    ctx.strokeStyle = fingerColors[fi % 5]; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(kp[a].x, kp[a].y); ctx.lineTo(kp[b].x, kp[b].y); ctx.stroke();
                });
                // Nuqtalar
                kp.forEach((p, i) => {
                    const fi = Math.floor(i / 4);
                    ctx.fillStyle = i === 0 ? '#fff' : fingerColors[fi % 5];
                    ctx.beginPath(); ctx.arc(p.x, p.y, i === 0 ? 6 : 4, 0, 2 * Math.PI); ctx.fill();
                });
                // Qaysi qo'l
                ctx.fillStyle = '#fdcb6e'; ctx.font = '16px Segoe UI';
                ctx.fillText(hand.handedness === 'Left' ? 'Chap' : 'O\'ng', kp[0].x - 15, kp[0].y - 15);
            });
            requestAnimationFrame(detectLoop);
        }
        init();
    </script>
</body>

</html>
