<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Shaxsiylashtirilgan O'qitish Tizimi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            min-height: 100vh
        }

        .header {
            background: linear-gradient(135deg, #1a1a3e, #2d1b69);
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .header h1 {
            color: #fdcb6e;
            font-size: 22px
        }

        .header span {
            color: #a8a8b3;
            font-size: 14px
        }

        .main {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: calc(100vh - 80px)
        }

        .sidebar {
            background: #16163a;
            padding: 20px;
            border-right: 1px solid #2a2a5a
        }

        .sidebar h3 {
            color: #fdcb6e;
            margin-bottom: 15px;
            font-size: 14px;
            text-transform: uppercase
        }

        .student-item {
            padding: 10px 12px;
            border-radius: 8px;
            margin: 4px 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px
        }

        .student-item:hover,
        .student-item.active {
            background: #2d1b69;
            color: #fdcb6e
        }

        .student-item .avg {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px
        }

        .avg-high {
            background: #00b89433;
            color: #00b894
        }

        .avg-mid {
            background: #fdcb6e33;
            color: #fdcb6e
        }

        .avg-low {
            background: #e9456033;
            color: #e94560
        }

        .content {
            padding: 30px
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px
        }

        .card {
            background: #1e1e42;
            border-radius: 12px;
            padding: 20px;
            text-align: center
        }

        .card .value {
            font-size: 28px;
            font-weight: bold;
            margin: 8px 0
        }

        .card .label {
            font-size: 12px;
            color: #a8a8b3
        }

        .section {
            background: #1e1e42;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px
        }

        .section h3 {
            color: #fdcb6e;
            margin-bottom: 15px;
            font-size: 16px
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            height: 200px;
            padding: 10px 0
        }

        .bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px
        }

        .bar {
            width: 100%;
            border-radius: 6px 6px 0 0;
            min-height: 5px;
            transition: height 0.5s
        }

        .bar-label {
            font-size: 11px;
            color: #a8a8b3
        }

        .bar-value {
            font-size: 13px;
            font-weight: bold
        }

        .recommendation {
            background: #0f3460;
            padding: 12px 15px;
            border-radius: 8px;
            margin: 8px 0;
            display: flex;
            gap: 12px;
            align-items: flex-start
        }

        .rec-icon {
            font-size: 24px;
            min-width: 30px
        }

        .rec-text h4 {
            font-size: 14px;
            color: #fdcb6e;
            margin-bottom: 3px
        }

        .rec-text p {
            font-size: 12px;
            color: #a8a8b3
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-right: 5px
        }

        .b-viz {
            background: #6c5ce733;
            color: #6c5ce7
        }

        .b-aud {
            background: #00b89433;
            color: #00b894
        }

        .b-pra {
            background: #fdcb6e33;
            color: #fdcb6e
        }

        .form-section {
            margin-bottom: 20px
        }

        .form-section label {
            display: block;
            font-size: 13px;
            color: #a8a8b3;
            margin-bottom: 5px
        }

        .form-section input,
        .form-section select {
            width: 100%;
            padding: 10px;
            background: #16163a;
            color: #fff;
            border: 1px solid #2a2a5a;
            border-radius: 8px;
            font-size: 14px
        }

        .form-section input:focus,
        .form-section select:focus {
            border-color: #fdcb6e;
            outline: none
        }

        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            width: 100%
        }

        .btn:hover {
            background: #c0392b
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px
        }

        .metric {
            text-align: center;
            padding: 15px;
            background: #16163a;
            border-radius: 8px
        }

        .metric .val {
            font-size: 24px;
            font-weight: bold;
            color: #00b894
        }

        .metric .lbl {
            font-size: 11px;
            color: #a8a8b3;
            margin-top: 5px
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>AI Shaxsiylashtirilgan O'qitish Tizimi</h1>
        <span id="studentCount"></span>
    </div>
    <div class="main">
        <div class="sidebar">
            <h3>Talabalar</h3>
            <div id="studentList"></div>
            <hr style="border-color:#2a2a5a;margin:15px 0">
            <h3>Yangi talaba</h3>
            <div class="form-section"><label>Ism</label><input id="newName" placeholder="Ismni kiriting"></div>
            <div class="form-section">
                <label>O'rganish uslubi</label>
                <select id="newStyle">
                    <option value="vizual">Vizual</option>
                    <option value="eshituvchan">Eshituvchan</option>
                    <option value="amaliy">Amaliy</option>
                </select>
            </div>
            <div class="form-section"><label>Matematika</label><input id="sMat" type="number" min="0" max="100"
                    value="70"></div>
            <div class="form-section"><label>Fizika</label><input id="sFiz" type="number" min="0" max="100" value="70">
            </div>
            <div class="form-section"><label>Kimyo</label><input id="sKim" type="number" min="0" max="100" value="70">
            </div>
            <div class="form-section"><label>Biologiya</label><input id="sBio" type="number" min="0" max="100"
                    value="70"></div>
            <div class="form-section"><label>Informatika</label><input id="sInf" type="number" min="0" max="100"
                    value="70"></div>
            <button class="btn" onclick="addStudent()">Qo'shish</button>
        </div>
        <div class="content" id="content">
            <p style="color:#a8a8b3;text-align:center;margin-top:100px">Talabani tanlang</p>
        </div>
    </div>
    <script>
        const subjects = ["Matematika", "Fizika", "Kimyo", "Biologiya", "Informatika"];
        const materials = {
            Matematika: { vizual: ["Video: Algebrani ko'rgazmali o'rganish", "Infografika: Formulalar jadvali"], eshituvchan: ["Podcast: Matematika asoslari", "Audio: Tenglamalar yechish"], amaliy: ["Mashqlar: 50 ta algebra masalasi", "Interaktiv: GeoGebra"] },
            Fizika: { vizual: ["Video: Nyuton qonunlari", "Simulyatsiya: PhET lab"], eshituvchan: ["Podcast: Fizika kundalik hayotda", "Audio: Mexanika"], amaliy: ["Tajriba: Erkin tushish", "Loyiha: Elektr zanjir"] },
            Kimyo: { vizual: ["Video: Kimyoviy reaksiyalar", "3D: Molekula tuzilishi"], eshituvchan: ["Podcast: Davriy jadval", "Audio: Kislotalar"], amaliy: ["Lab: Virtual laboratoriya", "Mashq: Tenglamalar"] },
            Biologiya: { vizual: ["Video: Hujayra tuzilishi", "Animatsiya: DNK"], eshituvchan: ["Podcast: Evolyutsiya", "Audio: Ekologiya"], amaliy: ["Loyiha: O'simlik kuzatuvi", "Tadqiqot: Mikroskop"] },
            Informatika: { vizual: ["Video: Python asoslari", "Infografika: Algoritmlar"], eshituvchan: ["Podcast: AI tarixi", "Audio: Dasturlash"], amaliy: ["Mashq: 30 ta Python masala", "Loyiha: Kalkulator"] }
        };
        const styleIcons = { vizual: "👁", eshituvchan: "👂", amaliy: "🖐" };
        const styleBadge = { vizual: "b-viz", eshituvchan: "b-aud", amaliy: "b-pra" };

        let students = [
            { id: 1, ism: "Ali", uslub: "vizual", natijalar: { Matematika: 85, Fizika: 45, Kimyo: 72, Biologiya: 90, Informatika: 60 } },
            { id: 2, ism: "Zilola", uslub: "eshituvchan", natijalar: { Matematika: 92, Fizika: 78, Kimyo: 55, Biologiya: 88, Informatika: 95 } },
            { id: 3, ism: "Sardor", uslub: "amaliy", natijalar: { Matematika: 40, Fizika: 65, Kimyo: 80, Biologiya: 35, Informatika: 70 } },
            { id: 4, ism: "Madina", uslub: "vizual", natijalar: { Matematika: 75, Fizika: 82, Kimyo: 90, Biologiya: 68, Informatika: 55 } },
            { id: 5, ism: "Diyorbek", uslub: "amaliy", natijalar: { Matematika: 60, Fizika: 50, Kimyo: 45, Biologiya: 70, Informatika: 85 } },
        ];

        function getAvg(n) { const v = Object.values(n); return Math.round(v.reduce((a, b) => a + b) / v.length); }
        function getColor(v) { return v >= 70 ? '#00b894' : v >= 50 ? '#fdcb6e' : '#e94560'; }
        function getAvgClass(v) { return v >= 70 ? 'avg-high' : v >= 50 ? 'avg-mid' : 'avg-low'; }

        function renderList() {
            const el = document.getElementById('studentList');
            el.innerHTML = students.map(s => {
                const avg = getAvg(s.natijalar);
                return `<div class="student-item" onclick="showStudent(${s.id})"><span>${s.ism}</span><span class="avg ${getAvgClass(avg)}">${avg}</span></div>`;
            }).join('');
            document.getElementById('studentCount').textContent = `${students.length} ta talaba`;
        }

        function getRecommendations(s) {
            const recs = [];
            subjects.forEach(m => {
                if (s.natijalar[m] < 70 && materials[m] && materials[m][s.uslub]) {
                    materials[m][s.uslub].forEach(mat => {
                        recs.push({ mavzu: m, material: mat, ball: s.natijalar[m] });
                    });
                }
            });
            return recs;
        }

        function showStudent(id) {
            document.querySelectorAll('.student-item').forEach((el, i) => { el.classList.toggle('active', students[i].id === id); });
            const s = students.find(x => x.id === id);
            const avg = getAvg(s.natijalar);
            const recs = getRecommendations(s);
            const weak = subjects.filter(m => s.natijalar[m] < 70).length;

            let html = `
            <div class="cards">
                <div class="card"><div class="label">Talaba</div><div class="value">${s.ism}</div></div>
                <div class="card"><div class="label">O'rtacha ball</div><div class="value" style="color:${getColor(avg)}">${avg}</div></div>
                <div class="card"><div class="label">O'rganish uslubi</div><div class="value">${styleIcons[s.uslub]}</div><span class="badge ${styleBadge[s.uslub]}">${s.uslub}</span></div>
                <div class="card"><div class="label">Zaif fanlar</div><div class="value" style="color:#e94560">${weak}</div></div>
            </div>
            <div class="section"><h3>Fanlar bo'yicha natijalar</h3><div class="bar-chart">`;
            subjects.forEach(m => {
                const v = s.natijalar[m];
                html += `<div class="bar-item"><div class="bar-value" style="color:${getColor(v)}">${v}</div><div class="bar" style="height:${v * 1.8}px;background:${getColor(v)}"></div><div class="bar-label">${m.substring(0, 4)}</div></div>`;
            });
            html += `</div></div>`;

            if (recs.length > 0) {
                html += `<div class="section"><h3>Shaxsiy tavsiyalar (${recs.length} ta)</h3>`;
                recs.forEach(r => {
                    html += `<div class="recommendation"><div class="rec-icon">📚</div><div class="rec-text"><h4>${r.mavzu} (${r.ball} ball)</h4><p>${r.material}</p></div></div>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="section"><h3>Tavsiyalar</h3><p style="color:#00b894">Barcha fanlardan yaxshi natija! Davom eting!</p></div>`;
            }

            // Model baholash
            let TP = 0, FP = 0, FN = 0;
            students.forEach(st => {
                const r = getRecommendations(st);
                const zaif = subjects.filter(m => st.natijalar[m] < 70);
                const recM = new Set(r.map(x => x.mavzu));
                zaif.forEach(m => { recM.has(m) ? TP++ : FN++; });
                recM.forEach(m => { if (!zaif.includes(m)) FP++; });
            });
            const prec = TP / (TP + FP) || 0, rec2 = TP / (TP + FN) || 0, f1 = 2 * prec * rec2 / (prec + rec2) || 0;

            html += `<div class="section"><h3>Model baholash</h3><div class="metrics">
                <div class="metric"><div class="val">${(prec * 100).toFixed(0)}%</div><div class="lbl">Precision</div></div>
                <div class="metric"><div class="val">${(rec2 * 100).toFixed(0)}%</div><div class="lbl">Recall</div></div>
                <div class="metric"><div class="val">${(f1 * 100).toFixed(0)}%</div><div class="lbl">F1 Score</div></div>
            </div></div>`;

            document.getElementById('content').innerHTML = html;
        }

        function addStudent() {
            const ism = document.getElementById('newName').value.trim();
            if (!ism) { alert('Ism kiriting!'); return; }
            const s = {
                id: Date.now(), ism,
                uslub: document.getElementById('newStyle').value,
                natijalar: {
                    Matematika: +document.getElementById('sMat').value,
                    Fizika: +document.getElementById('sFiz').value,
                    Kimyo: +document.getElementById('sKim').value,
                    Biologiya: +document.getElementById('sBio').value,
                    Informatika: +document.getElementById('sInf').value,
                }
            };
            students.push(s);
            renderList();
            showStudent(s.id);
            document.getElementById('newName').value = '';
        }

        renderList();
    </script>
</body>

</html>
