<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Vision — Rasmni Aniqlash</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
        }
        h1 { color: #fdcb6e; margin-bottom: 10px; }
        p.sub { color: #a8a8b3; margin-bottom: 30px; }
        .container {
            background: #16213e;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        #imagePreview {
            max-width: 100%;
            max-height: 350px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        input[type="file"] { display: none; }
        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover { background: #c0392b; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        #results {
            margin-top: 20px;
            text-align: left;
        }
        .result-item {
            background: #0f3460;
            padding: 12px 15px;
            border-radius: 8px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
        }
        .result-name { color: #fff; }
        .result-prob { color: #00b894; font-weight: bold; }
        #status { color: #fdcb6e; margin: 15px 0; }
    </style>
</head>
<body>
    <h1>Computer Vision</h1>
    <p class="sub">TensorFlow.js + MobileNet — Rasmni aniqlash</p>

    <div class="container">
        <label class="btn" for="fileInput">📁 Rasm tanlang</label>
        <input type="file" id="fileInput" accept="image/*">

        <img id="imagePreview" alt="Tanlangan rasm">
        <br>
        <button class="btn" id="predictBtn" disabled onclick="predict()">🔍 Aniqlash</button>
        <p id="status">Model yuklanmoqda...</p>
        <div id="results"></div>
    </div>

    <script>
        let model;

        async function loadModel() {
            model = await mobilenet.load();
            document.getElementById('status').textContent = '✅ Model tayyor!';
            document.getElementById('predictBtn').disabled = false;
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('imagePreview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('results').innerHTML = '';
                };
                reader.readAsDataURL(file);
            }
        });

        async function predict() {
            const img = document.getElementById('imagePreview');
            if (!img.src) return;

            document.getElementById('status').textContent = '🔄 Tahlil qilinmoqda...';
            const predictions = await model.classify(img);

            let html = '<h3 style="color:#fdcb6e; margin-bottom:10px;">📊 Natijalar:</h3>';
            predictions.forEach(p => {
                const percent = (p.probability * 100).toFixed(1);
                html += `<div class="result-item">
                    <span class="result-name">${p.className}</span>
                    <span class="result-prob">${percent}%</span>
                </div>`;
            });
            document.getElementById('results').innerHTML = html;
            document.getElementById('status').textContent = '✅ Tahlil yakunlandi!';
        }

        loadModel();
    </script>
</body>
</html>
