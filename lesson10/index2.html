<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Vision — Kamerada Aniqlash</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
        }

        h1 {
            color: #fdcb6e;
            margin-bottom: 10px;
        }

        p.sub {
            color: #a8a8b3;
            margin-bottom: 30px;
        }

        .container {
            background: #16213e;
            border-radius: 15px;
            padding: 30px;
            max-width: 650px;
            width: 100%;
            text-align: center;
        }

        video {
            width: 100%;
            max-height: 400px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }

        .btn:hover {
            background: #c0392b;
        }

        #results {
            margin-top: 20px;
            text-align: left;
        }

        .result-item {
            background: #0f3460;
            padding: 12px 15px;
            border-radius: 8px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
        }

        .result-name {
            color: #fff;
        }

        .result-prob {
            color: #00b894;
            font-weight: bold;
        }

        #status {
            color: #fdcb6e;
            margin: 15px 0;
        }

        .live-badge {
            display: inline-block;
            background: #e94560;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 12px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>
    <h1>Real-time Computer Vision</h1>
    <p class="sub">Kamerada jonli tahlil — TensorFlow.js + MobileNet</p>

    <div class="container">
        <video id="video" autoplay playsinline></video>
        <br>
        <button class="btn" onclick="startCamera()">📷 Kamerani yoqish</button>
        <button class="btn" onclick="captureAndPredict()">🔍 Aniqlash</button>
        <button class="btn" onclick="startLive()">🔴 Jonli tahlil</button>
        <p id="status">Model yuklanmoqda...</p>
        <div id="results"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        let model;
        let liveMode = false;

        async function loadModel() {
            model = await mobilenet.load();
            document.getElementById('status').textContent = '✅ Model tayyor!';
        }

        async function startCamera() {
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            document.getElementById('status').textContent = '📷 Kamera yoqildi!';
        }

        async function captureAndPredict() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            document.getElementById('status').textContent = '🔄 Tahlil qilinmoqda...';
            const predictions = await model.classify(canvas);
            showResults(predictions);
            document.getElementById('status').textContent = '✅ Tahlil yakunlandi!';
        }

        async function startLive() {
            liveMode = !liveMode;
            if (liveMode) {
                document.getElementById('status').innerHTML = '<span class="live-badge">🔴 JONLI</span> Tahlil davom etmoqda...';
                livePredict();
            } else {
                document.getElementById('status').textContent = '⏸ Jonli tahlil to\'xtatildi';
            }
        }

        async function livePredict() {
            if (!liveMode) return;
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            const predictions = await model.classify(canvas);
            showResults(predictions);
            setTimeout(livePredict, 2000);
        }

        function showResults(predictions) {
            let html = '<h3 style="color:#fdcb6e; margin-bottom:10px;">📊 Natijalar:</h3>';
            predictions.forEach(p => {
                const percent = (p.probability * 100).toFixed(1);
                html += `<div class="result-item">
                    <span class="result-name">${p.className}</span>
                    <span class="result-prob">${percent}%</span>
                </div>`;
            });
            document.getElementById('results').innerHTML = html;
        }

        loadModel();
    </script>
</body>

</html>
