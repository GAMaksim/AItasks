<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4. COCO-SSD — Object Detection</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
        }

        h1 {
            color: #fdcb6e;
            margin-bottom: 5px;
        }

        .sub {
            color: #a8a8b3;
            margin-bottom: 25px;
        }

        .container {
            background: #16213e;
            border-radius: 15px;
            padding: 25px;
            max-width: 650px;
            width: 100%;
            text-align: center;
        }

        .canvas-wrap {
            position: relative;
            display: inline-block;
            margin: 15px 0;
        }

        canvas {
            border-radius: 10px;
            max-width: 100%;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }

        .btn:hover {
            background: #c0392b;
        }

        .result {
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
        }

        #status {
            color: #fdcb6e;
            margin: 12px 0;
        }
    </style>
</head>

<body>
    <h1>Object Detection</h1>
    <p class="sub">TensorFlow.js + COCO-SSD</p>
    <div class="container">
        <label class="btn" for="fileInput">Rasm tanlang</label>
        <input type="file" id="fileInput" accept="image/*">
        <div class="canvas-wrap">
            <canvas id="canvas"></canvas>
        </div>
        <br>
        <button class="btn" onclick="detect()">Aniqlash</button>
        <p id="status">Model yuklanmoqda...</p>
        <div id="results"></div>
    </div>
    <img id="hiddenImg" style="display:none">
    <script>
        let model;
        async function init() {
            model = await cocoSsd.load();
            document.getElementById('status').textContent = 'Model tayyor!';
        }
        document.getElementById('fileInput').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = document.getElementById('hiddenImg');
                    img.src = e.target.result;
                    img.onload = function () {
                        const canvas = document.getElementById('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        canvas.getContext('2d').drawImage(img, 0, 0);
                    };
                };
                reader.readAsDataURL(file);
            }
        });
        async function detect() {
            if (!model) return;
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const img = document.getElementById('hiddenImg');
            ctx.drawImage(img, 0, 0);
            document.getElementById('status').textContent = 'Aniqlash...';
            const predictions = await model.detect(canvas);
            let html = '';
            predictions.forEach(p => {
                const [x, y, w, h] = p.bbox;
                ctx.strokeStyle = '#e94560';
                ctx.lineWidth = 3;
                ctx.strokeRect(x, y, w, h);
                ctx.fillStyle = '#e94560';
                ctx.fillRect(x, y - 25, ctx.measureText(p.class).width + 60, 25);
                ctx.fillStyle = '#fff';
                ctx.font = '16px Segoe UI';
                ctx.fillText(`${p.class} ${(p.score * 100).toFixed(0)}%`, x + 5, y - 7);
                html += `<div class="result"><span>${p.class}</span><span style="color:#00b894">${(p.score * 100).toFixed(1)}%</span></div>`;
            });
            document.getElementById('results').innerHTML = html || '<p>Hech narsa topilmadi</p>';
            document.getElementById('status').textContent = `${predictions.length} ta obyekt topildi!`;
        }
        init();
    </script>
</body>

</html>
